name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm test
        working-directory: app

  docker:
    name: build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t wallet-api:${{ github.sha }} ./app

      - name: Smoke test
        run: |
          docker run -d --name api -p 8080:8080 wallet-api:${{ github.sha }}

          # give the container a moment, then hit the health endpoint
          for i in $(seq 1 10); do
            if curl -fsS http://localhost:8080/healthz; then
              echo "healthy"
              exit 0
            fi
            sleep 2
          done

          echo "container never became healthy"
          docker logs api
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f api || true

  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - run: terraform fmt -check -recursive

      - run: terraform init -backend=false

      - run: terraform validate
